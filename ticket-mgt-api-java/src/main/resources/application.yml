server:
  port: 8080

spring:
  application:
    name: ticket-mgt-api

  datasource:
    url: jdbc:h2:file:./data/ticket_settings;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

app:
  security:
    jwt:
      secret: ${JWT_SECRET:veryLongSecretKeyForJWTGenerationThatMustBeAtLeast256BitsLong}
      expiration-ms: 86400000 # 1 day

escalation:
  scheduler:
    fixed-delay-ms: 30000  # poll every 30 seconds

logging:
  level:
    org.springframework.security: DEBUG
    com.ticketmgt.settings: DEBUG
    com.ticketmgt.escalationpolicy.engine: DEBUG
