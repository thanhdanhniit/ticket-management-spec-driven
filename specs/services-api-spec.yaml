openapi: 3.0.3
info:
  title: Services Management API
  version: 1.0.0
  description: >-
    Enterprise-grade API for managing logical Services, including metadata tagging,
    maintenance scheduling, and health metrics tracking.

servers:
  - url: /api/v1

paths:
  /services:
    get:
      summary: Retrieve a paginated list of services
      description: Fetches a directory of services with their health metrics. Supports searching by name/tag and filtering by owner.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt,desc
        - name: search
          in: query
          description: Search term to filter services by name or tags.
          schema:
            type: string
        - name: ownerIds
          in: query
          description: Comma-separated list of User or Team UUIDs to filter services by owner.
          schema:
            type: string
      responses:
        '200':
          description: A paginated list of services.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServicePageResponse'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

    post:
      summary: Define a new service
      description: Creates a new logical service within the system. Ensures uniqueness of the service name.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreateRequest'
      responses:
        '201':
          description: Service created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Validation error or duplicate service name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

  /services/{id}:
    get:
      summary: Retrieve a single service
      description: Fetches the details of a specific service by its UUID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detailed service object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '404':
          description: Service not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

    put:
      summary: Update a service
      description: Updates general metadata of a service.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdateRequest'
      responses:
        '200':
          description: Service updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '404':
          description: Service not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

    delete:
      summary: Delete a service
      description: Deletes a specific service.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Service deleted successfully.
        '404':
          description: Service not found.

  /services/{id}/tags:
    put:
      summary: Update service metadata tags
      description: Bulk updates the key-value tagging metadata for a specific service. Missing tags are implicitly deleted, new tags are appended.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureTagsUpdateRequest'
      responses:
        '200':
          description: Tags updated successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagDTO'
        '404':
          description: Service not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

  /services/{id}/maintenance-windows:
    put:
      summary: Manage Maintenance Mode schedules
      description: Enables or disables maintenance mode and manages the schedules for a specific service.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceModeUpdateRequest'
      responses:
        '200':
          description: Maintenance configurations saved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceModeResponse'
        '400':
          description: Validation error (e.g., overlapping dates).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

components:
  schemas:
    ServicePageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ServiceResponse'
        totalPages:
          type: integer
        totalElements:
          type: integer
        size:
          type: integer
        number:
          type: integer

    ServiceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        owner:
          $ref: '#/components/schemas/OwnerSummary'
        escalationPolicy:
          $ref: '#/components/schemas/PolicySummary'
        alertSources:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagDTO'
        maintenanceEnabled:
          type: boolean
        metrics:
          $ref: '#/components/schemas/ServiceMetrics'
        healthStatus:
          type: string
          enum: [HEALTHY, DEGRADED, CRITICAL, MAINTENANCE]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OwnerSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [USER, SQUAD]

    PolicySummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    ServiceMetrics:
      type: object
      properties:
        openIncidentsTriggered:
          type: integer
        openIncidentsAcknowledged:
          type: integer
        mttaMinutes:
          type: number
          format: float
        mttrHours:
          type: number
          format: float

    ServiceCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 255
        ownerId:
          type: string
          format: uuid
        escalationPolicyId:
          type: string
          format: uuid

    ServiceUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 255
        ownerId:
          type: string
          format: uuid
        escalationPolicyId:
          type: string
          format: uuid

    FeatureTagsUpdateRequest:
      type: object
      properties:
        tags:
          type: array
          items:
            $ref: '#/components/schemas/TagDTO'

    TagDTO:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
        value:
          type: string

    MaintenanceModeUpdateRequest:
      type: object
      required:
        - maintenanceEnabled
      properties:
        maintenanceEnabled:
          type: boolean
        schedules:
          type: array
          items:
            $ref: '#/components/schemas/MaintenanceSchedule'
          description: Ignored if maintenanceEnabled is false.

    MaintenanceSchedule:
      type: object
      required:
        - startDate
        - startTime
        - repeatsEvery
      properties:
        id:
          type: string
          format: uuid
          description: Provide the ID if updating an existing schedule, omit for a new block.
        startDate:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endDate:
          type: string
          format: date
        endTime:
          type: string
          format: time
        repeatsEvery:
          type: string
          enum: [NEVER, DAILY, WEEKLY, MONTHLY]

    MaintenanceModeResponse:
      type: object
      properties:
        maintenanceEnabled:
          type: boolean
        schedules:
          type: array
          items:
            $ref: '#/components/schemas/MaintenanceSchedule'

    StandardError:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
